<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { 
      width: 400px; min-height: 500px;
      background: #0a0a12; color: #e0e0e0;
      font-family: system-ui, sans-serif;
      margin: 0; padding: 12px;
    }
    h1 { font-size: 18px; margin: 0 0 8px; }
    h1 span { color: #00e676; }
    .stats { font-size: 11px; color: #666; margin-bottom: 12px; }
    input { 
      width: 100%; padding: 8px 12px; border-radius: 8px;
      border: 1px solid #2a2a3e; background: #12121a; color: #e0e0e0;
      font-size: 12px; outline: none; box-sizing: border-box; margin-bottom: 8px;
    }
    .ch-list { max-height: 380px; overflow-y: auto; }
    .ch-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 8px;
      border: 1px solid #1e1e2e; background: #12121a;
      margin-bottom: 4px; cursor: pointer; font-size: 12px;
    }
    .ch-item:hover { border-color: #333; }
    .ch-item .play { color: #00e67655; font-size: 10px; margin-left: auto; }
    .loading { text-align: center; padding: 20px; color: #555; }
    #player-container { margin-top: 8px; background: #000; border-radius: 8px; overflow: hidden; }
    video { width: 100%; display: block; max-height: 250px; }
    #back { display: none; padding: 6px 12px; border-radius: 6px; border: 1px solid #333; background: #1a1a2e; color: #aaa; cursor: pointer; font-size: 11px; margin-bottom: 6px; }
  </style>
</head>
<body>
  <h1>📺 <span>IPTV</span> Injector</h1>
  <div class="stats" id="stats">Loading channels...</div>
  
  <div id="list-view">
    <input type="text" id="search" placeholder="🔍 Cari channel... (beIN, ESPN, DAZN, Sky...)" oninput="filterChannels()">
    <div class="ch-list" id="ch-list"></div>
  </div>

  <button id="back" onclick="showList()">← Kembali</button>
  <div id="player-container" style="display:none">
    <video id="player" controls autoplay playsInline></video>
  </div>

  <script src="popup.js"></script>
</body>
</html>
